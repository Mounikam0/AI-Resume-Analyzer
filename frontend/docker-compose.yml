version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/resume_db
  frontend:
    build: ./frontend
    ports:
      - "5173:3000"
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resume_db
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
